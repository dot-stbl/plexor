<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Color scheme + theme -->
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1C1B1F" />

    <!-- Identity -->
    <meta
      name="description"
      content="Plexor — self-hosted cloud platform"
    />
    <meta name="application-name" content="Plexor" />
    <meta name="generator" content="Plexor Portal" />
    <meta name="robots" content="index,follow" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link
      rel="mask-icon"
      href="/safari-pinned-tab.svg"
      color="#1C1B1F"
    />

    <!-- iOS / Web App -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Plexor" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#1C1B1F" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Plexor" />
    <meta property="og:title" content="Plexor" />
    <meta property="og:description" content="self-hosted cloud platform" />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/dot-stbl/.github/main/assets/og-plexor.svg"
    />
    <meta property="og:url" content="https://portal.plexor.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Plexor" />
    <meta name="twitter:description" content="self-hosted cloud platform" />
    <meta
      name="twitter:image"
      content="https://raw.githubusercontent.com/dot-stbl/.github/main/assets/og-plexor.svg"
    />

    <title>Plexor</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
