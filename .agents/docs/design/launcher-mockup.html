<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plexor · Центр управления — макет лаунчера</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        oklch(97.5% 0.004 240);
    --surface:   #ffffff;
    --surface-2: oklch(97% 0.004 240);
    --surface-3: oklch(94.5% 0.005 240);
    --fg:        oklch(21% 0.02 250);
    --fg-2:      oklch(44% 0.016 250);
    --muted:     oklch(56% 0.014 250);
    --border:    oklch(91% 0.006 250);
    --border-2:  oklch(86% 0.008 250);
    --ink:       oklch(24% 0.02 255);
    --idle-soft: oklch(94% 0.004 250);
    --idle-ink:  oklch(46% 0.012 250);
    --radius: 12px;
    --font: 'Onest', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    color: var(--fg);
    /* Dim backdrop suggests the launcher is an overlay over the app. */
    background:
      radial-gradient(120% 90% at 82% 8%, oklch(88% 0.01 250) 0%, transparent 55%),
      oklch(30% 0.02 255);
    -webkit-font-smoothing: antialiased;
  }

  /* Thin dark rail hint on the far left (the collapsed sidebar behind the sheet). */
  .rail-hint {
    position: fixed; inset: 0 auto 0 0; width: 48px; z-index: 1;
    background: oklch(20.5% 0.015 255);
    display: flex; flex-direction: column; align-items: center; gap: 14px; padding-top: 14px;
  }
  .rail-hint .tile { width: 30px; height: 30px; border-radius: 8px; }
  .rail-hint .brand { background: var(--fg); }
  .rail-hint .active { background: oklch(100% 0 0 / 0.16); }
  .rail-hint .dot { width: 18px; height: 18px; border-radius: 6px; background: oklch(100% 0 0 / 0.10); }

  /* ─── Sheet (left drawer) ─── */
  .sheet {
    position: fixed; inset: 0 auto 0 48px; z-index: 2;
    width: min(880px, 92vw);
    background: var(--surface);
    border-right: 1px solid var(--border-2);
    box-shadow: 0 0 0 1px oklch(20% 0 0 / 0.04), 40px 0 80px -40px oklch(20% 0 0 / 0.5);
    display: flex; flex-direction: column;
    animation: slideIn .22s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes slideIn { from { transform: translateX(-24px); opacity: 0; } }

  .sheet-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border);
  }
  .sheet-head h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .sheet-head p { margin: 3px 0 0; font-size: 12px; color: var(--muted); }
  .x-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px; border: 0; background: transparent;
    color: var(--fg-2); cursor: pointer; transition: background .12s;
  }
  .x-btn:hover { background: var(--surface-2); color: var(--fg); }

  .scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; }

  /* ─── Meta hub cards (top) ─── */
  .meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    padding: 20px 24px 16px;
  }
  .meta-card {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); text-decoration: none; color: inherit;
    box-shadow: 0 1px 2px oklch(20% 0 0 / 0.04); transition: transform .14s, box-shadow .14s, border-color .14s;
  }
  .meta-card:hover { transform: translateY(-2px); border-color: var(--border-2); box-shadow: 0 6px 18px -8px oklch(20% 0 0 / 0.28); }
  .meta-card .glyph { flex: none; }
  .meta-card .t { font-size: 12px; font-weight: 500; line-height: 1.2; }
  .meta-card .c { font-size: 10.5px; color: var(--muted); margin-top: 2px; line-height: 1.2; }

  /* ─── Sticky search ─── */
  .search-wrap {
    position: sticky; top: 0; z-index: 3;
    padding: 12px 24px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: color-mix(in oklab, var(--surface) 92%, transparent); backdrop-filter: blur(6px);
  }
  .search { position: relative; }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .search input {
    width: 100%; height: 34px; border: 1px solid var(--border-2); border-radius: 9px;
    background: var(--surface-2); padding: 0 12px 0 34px; font: inherit; font-size: 12.5px; color: var(--fg);
    outline: none; transition: border-color .12s, box-shadow .12s;
  }
  .search input::placeholder { color: var(--muted); }
  .search input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px oklch(24% 0.02 255 / 0.14); }

  /* ─── Blocks (category cards) ─── */
  .blocks {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    padding: 18px 24px 28px; align-items: start;
  }
  .block {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); overflow: hidden;
    box-shadow: 0 1px 2px oklch(20% 0 0 / 0.04), 0 10px 28px -18px oklch(20% 0 0 / 0.4);
  }
  .block-head { display: flex; align-items: center; gap: 10px; padding: 13px 14px 11px; }
  .block-head .tile {
    flex: none; width: 32px; height: 32px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--ink); color: #fff;
  }
  .block-head .tt { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .block-head .cc { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .block-head .soon-tag {
    margin-left: auto; font-size: 10px; font-weight: 500; color: var(--idle-ink);
    background: var(--idle-soft); border-radius: 999px; padding: 2px 8px;
  }
  .block-body {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    padding: 4px 8px 10px; border-top: 1px solid var(--border);
  }

  /* Icon-button = a concrete page/function inside the block. */
  .fn {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 9px; border-radius: 9px; text-decoration: none; color: inherit;
    transition: background .12s;
  }
  .fn:hover { background: var(--surface-2); }
  .fn .ib {
    flex: none; width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface-3); color: var(--fg); transition: background .12s, color .12s;
  }
  .fn:hover .ib { background: var(--ink); color: #fff; }
  .fn .lbl { font-size: 12px; font-weight: 500; line-height: 1.15; min-width: 0; }
  .fn .lbl small { display: block; font-size: 10px; font-weight: 400; color: var(--muted); }
  .fn.soon { cursor: default; opacity: 0.55; }
  .fn.soon:hover { background: transparent; }
  .fn.soon:hover .ib { background: var(--surface-3); color: var(--fg); }
  .fn .mini-soon { margin-left: auto; font-size: 9.5px; color: var(--idle-ink); background: var(--idle-soft); border-radius: 999px; padding: 1px 6px; }

  .empty { padding: 40px 24px; text-align: center; color: var(--muted); font-size: 12.5px; }
  .group-label {
    grid-column: 1 / -1; font-size: 10.5px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); padding: 6px 26px 2px;
  }

  @media (max-width: 760px) {
    .meta { grid-template-columns: repeat(2, 1fr); }
    .blocks { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<aside class="sheet" data-od-id="launcher-sheet" aria-label="Центр управления">
  <div class="sheet-head">
    <div>
      <h1>Центр управления</h1>
      <p>Все сервисы и разделы проекта <span style="font-family:var(--mono)">prod-cluster</span></p>
    </div>
    <button class="x-btn" aria-label="Закрыть"><svg width="18" height="18"><use href="#i-x"/></svg></button>

    <!-- Meta hubs -->

    <div class="search-wrap">
      <div class="search">
        <svg width="15" height="15"><use href="#i-search"/></svg>
        <input id="q" type="text" placeholder="Поиск по сервисам и страницам" autocomplete="off" />
      </div>
    </div>

    <!-- Blocks -->
    <div class="blocks" id="blocks" data-od-id="launcher-blocks"></div>
  </div>
</aside>

<script>
  // Meta hubs — cross-cutting entry surfaces (not per-resource groups).
  const META = [
    { icon: 'i-grid',     t: 'Обзор проекта', c: 'Сводка и быстрые действия' },
    { icon: 'i-book',     t: 'Документация',  c: 'API (Scalar) и гайды' },
    { icon: 'i-gear',     t: 'Администрирование', c: 'Ноды, провайдеры, кластер' },
    { icon: 'i-settings', t: 'Настройки',     c: 'Профиль, ключи, тема' },
  ];

  // Resource blocks. `live:true` = route exists in the console today.
  // `soon:true` = on the roadmap (Phase 2/3 per yandex-cloud-parity.md) — honest, non-clickable.
  const BLOCKS = [
    { title: 'Вычисления', caption: 'ВМ, образы, снапшоты', icon: 'i-cube', items: [
      { t: 'Виртуальные машины', d: 'Инстансы и статусы', icon: 'i-cube', live: true },
      { t: 'Создать ВМ',          d: 'Мастер, 6 шагов',    icon: 'i-plus', live: true },
      { t: 'Образы',              d: 'ОС и свои образы',   icon: 'i-image' },
      { t: 'Снапшоты ВМ',         d: 'Копии дисков',       icon: 'i-camera' },
      { t: 'K8s-кластеры',        d: 'Managed K3s',        icon: 'i-hex', soon: true },
    ]},
    { title: 'Сеть', caption: 'VPC, доступ, трафик', icon: 'i-net', items: [
      { t: 'VPC и подсети',   d: 'Изолированные сети', icon: 'i-net', live: true },
      { t: 'Security Groups', d: 'Правила доступа',    icon: 'i-shield' },
      { t: 'Floating IP',     d: 'Внешние адреса',     icon: 'i-globe' },
      { t: 'Балансировщики',  d: 'HAProxy L4/L7',      icon: 'i-balance' },
      { t: 'DNS-зоны',        d: 'PowerDNS',           icon: 'i-globe', soon: true },
    ]},
    { title: 'Хранилище', caption: 'Блочное и объектное', icon: 'i-disk', items: [
      { t: 'Диски',    d: 'Block volumes (SSD/HDD)', icon: 'i-disk' },
      { t: 'Бакеты',   d: 'S3-совместимые',          icon: 'i-bucket' },
      { t: 'Снапшоты', d: 'Копии томов',             icon: 'i-camera' },
    ]},
    { title: 'Доступы · IAM', caption: 'Пользователи и ключи', icon: 'i-users', items: [
      { t: 'Пользователи', d: 'Учётные записи',   icon: 'i-users' },
      { t: 'Роли',         d: 'RBAC-права',        icon: 'i-shield' },
      { t: 'SSH-ключи',    d: 'Доступ к ВМ',       icon: 'i-key' },
      { t: 'API-ключи',    d: 'Сервисные аккаунты', icon: 'i-key' },
    ]},
    { title: 'Наблюдаемость', caption: 'Метрики, логи, аудит', icon: 'i-chart', items: [
      { t: 'Метрики',       d: 'Prometheus',      icon: 'i-chart' },
      { t: 'Логи',          d: 'Поиск по логам',  icon: 'i-logs' },
      { t: 'Журнал аудита', d: 'История действий', icon: 'i-clock', live: true },
    ]},
    { title: 'Платформа данных', caption: 'Управляемые СУБД', icon: 'i-db', soon: true, items: [
      { t: 'PostgreSQL', d: 'CloudNativePG',  icon: 'i-db',       soon: true },
      { t: 'Redis',      d: 'Кэш и очереди',  icon: 'i-flash',    soon: true },
      { t: 'ClickHouse', d: 'Аналитика',      icon: 'i-columns',  soon: true },
      { t: 'Kafka',      d: 'Стриминг',       icon: 'i-flash',    soon: true },
      { t: 'Container Registry', d: 'Образы контейнеров', icon: 'i-registry', soon: true },
    ]},
  ];

  const svg = (id, size) => `<svg class="glyph" width="${size}" height="${size}"><use href="#${id}"/></svg>`;

  // Render meta hubs
  document.getElementById('meta').innerHTML = META.map(m => `
    <a class="meta-card" href="#">
      ${svg(m.icon, 18)}
      <span><span class="t">${m.t}</span><span class="c">${m.c}</span></span>
    </a>`).join('');

  // Render blocks
  const blocksEl = document.getElementById('blocks');
  function render(filter = '') {
    const f = filter.trim().toLowerCase();
    let html = '';
    let shown = 0;
    for (const b of BLOCKS) {
      const items = b.items.filter(it => !f || it.t.toLowerCase().includes(f) || it.d.toLowerCase().includes(f) || b.title.toLowerCase().includes(f));
      if (!items.length) continue;
      shown += items.length;
      html += `<div class="block" data-od-id="block-${b.title}">
        <div class="block-head">
          <span class="tile">${svg(b.icon, 18)}</span>
          <span><div class="tt">${b.title}</div><div class="cc">${b.caption}</div></span>
          ${b.soon ? '<span class="soon-tag">скоро</span>' : ''}
        </div>
        <div class="block-body">
          ${items.map(it => {
            const cls = it.soon ? 'fn soon' : 'fn';
            const tag = it.soon ? '<span class="mini-soon">скоро</span>' : '';
            const el = it.soon ? 'div' : 'a';
            const href = it.soon ? '' : 'href="#"';
            return `<${el} class="${cls}" ${href}>
              <span class="ib">${svg(it.icon, 17)}</span>
              <span class="lbl">${it.t}<small>${it.d}</small></span>${tag}
            </${el}>`;
          }).join('')}
        </div>
      </div>`;
    }
    blocksEl.innerHTML = html || `<div class="empty">Ничего не найдено по запросу «${filter}».</div>`;
  }
  render();

  document.getElementById('q').addEventListener('input', e => render(e.target.value));
</script>
</body>
</html>
