<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plexor · Центр управления — макет лаунчера</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --fg:        oklch(24% 0.02 250);
    --fg-2:      oklch(42% 0.016 250);
    --muted:     oklch(52% 0.014 250);
    --ink:       oklch(24% 0.02 255);
    --glass:        oklch(100% 0 0 / 0.58);
    --glass-strong: oklch(100% 0 0 / 0.72);
    --glass-border: oklch(100% 0 0 / 0.65);
    --hairline:     oklch(60% 0.02 250 / 0.14);
    --radius: 14px;
    --font: 'Onest', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    color: var(--fg);
    background: linear-gradient(135deg, oklch(96% 0.008 250), oklch(93% 0.014 265));
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  /* Blurred ambient backdrop — the whole screen behind the floating panel.
     In React this same effect comes from backdrop-blur over the real app content. */
  body::before {
    content: ''; position: fixed; inset: -12%; z-index: 0;
    background:
      radial-gradient(38% 42% at 18% 22%, oklch(66% 0.14 262 / 0.30), transparent 70%),
      radial-gradient(34% 38% at 82% 16%, oklch(70% 0.12 195 / 0.26), transparent 70%),
      radial-gradient(42% 46% at 74% 82%, oklch(66% 0.15 320 / 0.24), transparent 70%),
      radial-gradient(40% 44% at 26% 86%, oklch(70% 0.13 155 / 0.22), transparent 70%);
    filter: blur(70px) saturate(1.1);
  }

  /* Collapsed sidebar hint on the far left (context behind the sheet). */
  .rail-hint {
    position: fixed; inset: 0 auto 0 0; width: 48px; z-index: 2;
    background: oklch(24% 0.015 255 / 0.72); backdrop-filter: blur(12px);
    border-right: 1px solid oklch(100% 0 0 / 0.08);
    display: flex; flex-direction: column; align-items: center; gap: 14px; padding-top: 14px;
  }
  .rail-hint .tile { width: 30px; height: 30px; border-radius: 8px; }
  .rail-hint .brand { background: oklch(100% 0 0 / 0.92); }
  .rail-hint .active { background: oklch(100% 0 0 / 0.18); }
  .rail-hint .dot { width: 18px; height: 18px; border-radius: 6px; background: oklch(100% 0 0 / 0.10); }

  /* ─── Sheet: NO background — just a positioned scroll region. Cards float. ─── */
  .sheet {
    position: fixed; inset: 0 auto 0 48px; z-index: 3;
    width: min(920px, 93vw);
    display: flex; flex-direction: column;
    animation: slideIn .24s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes slideIn { from { transform: translateX(-22px); opacity: 0; } }

  .sheet-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 22px 26px 16px;
  }
  .sheet-head h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .sheet-head p { margin: 3px 0 0; font-size: 12px; color: var(--fg-2); }
  .x-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 9px; cursor: pointer; color: var(--fg-2);
    background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(12px);
    transition: background .12s, color .12s;
  }
  .x-btn:hover { background: var(--glass-strong); color: var(--fg); }

  .scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: oklch(50% 0.02 250 / 0.3) transparent; }

  /* ─── Meta hub cards — glass, floating ─── */
  .meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    padding: 6px 26px 16px;
  }
  .meta-card {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: 11px; text-decoration: none; color: inherit;
    background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: 0 1px 2px oklch(20% 0 0 / 0.05), 0 12px 26px -18px oklch(30% 0.03 265 / 0.5);
    transition: transform .14s, box-shadow .14s, background .14s;
  }
  .meta-card:hover { transform: translateY(-2px); background: var(--glass-strong); box-shadow: 0 10px 26px -12px oklch(30% 0.05 265 / 0.5); }
  .meta-card .glyph { flex: none; color: var(--fg); }
  .meta-card .t { font-size: 12px; font-weight: 500; line-height: 1.2; }
  .meta-card .c { font-size: 10.5px; color: var(--muted); margin-top: 2px; line-height: 1.2; }

  /* ─── Sticky glass search ─── */
  .search-wrap { position: sticky; top: 0; z-index: 4; padding: 8px 26px 14px; }
  .search { position: relative; }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .search input {
    width: 100%; height: 38px; border-radius: 11px; font: inherit; font-size: 12.5px; color: var(--fg);
    background: var(--glass-strong); border: 1px solid var(--glass-border); backdrop-filter: blur(16px) saturate(1.2);
    padding: 0 12px 0 36px; outline: none; box-shadow: 0 8px 22px -16px oklch(30% 0.03 265 / 0.5);
    transition: border-color .12s, box-shadow .12s;
  }
  .search input::placeholder { color: var(--muted); }
  .search input:focus { border-color: oklch(60% 0.02 255 / 0.5); box-shadow: 0 0 0 3px oklch(60% 0.03 255 / 0.14); }

  /* ─── Blocks: colored gradient header + glass body, floating ─── */
  .blocks { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 6px 26px 30px; align-items: start; }
  .block {
    border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--glass-border);
    box-shadow: 0 2px 4px oklch(20% 0 0 / 0.05), 0 22px 48px -24px oklch(28% 0.04 265 / 0.6);
  }
  .block-head {
    display: flex; align-items: center; gap: 11px; padding: 14px 15px 13px;
    color: #fff; /* header sits on the block's color gradient (set inline per block) */
  }
  .block-head .tile {
    flex: none; width: 34px; height: 34px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    background: oklch(100% 0 0 / 0.20); color: #fff;
  }
  .block-head .tt { font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; text-shadow: 0 1px 2px oklch(20% 0.03 265 / 0.22); }
  .block-head .cc { font-size: 11px; color: oklch(100% 0 0 / 0.82); margin-top: 1px; }
  .block-head .soon-tag { margin-left: auto; font-size: 10px; font-weight: 500; color: #fff; background: oklch(100% 0 0 / 0.22); border-radius: 999px; padding: 2px 8px; }

  .block-body {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 7px 8px 9px;
    background: var(--glass); backdrop-filter: blur(20px) saturate(1.3);
    border-top: 1px solid oklch(100% 0 0 / 0.4);
  }

  /* Icon-button = a concrete page/function inside the block. */
  .fn { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 9px; text-decoration: none; color: inherit; transition: background .12s; }
  .fn:hover { background: color-mix(in oklab, var(--a) 12%, transparent); }
  .fn .ib {
    flex: none; width: 29px; height: 29px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: oklch(100% 0 0 / 0.55); color: var(--fg); border: 1px solid var(--hairline);
    transition: background .12s, color .12s, border-color .12s;
  }
  .fn:hover .ib { background: var(--a); color: #fff; border-color: transparent; }
  .fn .lbl { font-size: 12px; font-weight: 500; line-height: 1.15; min-width: 0; }
  .fn .lbl small { display: block; font-size: 10px; font-weight: 400; color: var(--muted); }
  .fn.soon { cursor: default; opacity: 0.55; }
  .fn.soon:hover { background: transparent; }
  .fn.soon:hover .ib { background: oklch(100% 0 0 / 0.55); color: var(--fg); border-color: var(--hairline); }
  .fn .mini-soon { margin-left: auto; font-size: 9.5px; color: var(--fg-2); background: oklch(60% 0.02 250 / 0.14); border-radius: 999px; padding: 1px 6px; }

  .empty { padding: 40px 24px; text-align: center; color: var(--fg-2); font-size: 12.5px; }

  @media (max-width: 760px) {
    .meta { grid-template-columns: repeat(2, 1fr); }
    .blocks { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

      { t: 'Redis',      d: 'Кэш и очереди',  icon: 'i-flash',    soon: true },
      { t: 'ClickHouse', d: 'Аналитика',      icon: 'i-columns',  soon: true },
      { t: 'Kafka',      d: 'Стриминг',       icon: 'i-flash',    soon: true },
      { t: 'Container Registry', d: 'Образы контейнеров', icon: 'i-registry', soon: true },
    ]},
  ];

  const svg = (id, size) => `<svg class="glyph" width="${size}" height="${size}"><use href="#${id}"/></svg>`;

  document.getElementById('meta').innerHTML = META.map(m => `
    <a class="meta-card" href="#">
      ${svg(m.icon, 18)}
      <span><span class="t">${m.t}</span><span class="c">${m.c}</span></span>
    </a>`).join('');

  const blocksEl = document.getElementById('blocks');
  function render(filter = '') {
    const f = filter.trim().toLowerCase();
    let html = '';
    for (const b of BLOCKS) {
      const items = b.items.filter(it => !f || it.t.toLowerCase().includes(f) || it.d.toLowerCase().includes(f) || b.title.toLowerCase().includes(f));
      if (!items.length) continue;
      html += `<div class="block" data-od-id="block-${b.title}" style="--a:${b.a}">
        <div class="block-head" style="background:${b.g}">
          <span class="tile">${svg(b.icon, 18)}</span>
          <span><div class="tt">${b.title}</div><div class="cc">${b.caption}</div></span>
          ${b.soon ? '<span class="soon-tag">скоро</span>' : ''}
        </div>
        <div class="block-body">
          ${items.map(it => {
            const cls = it.soon ? 'fn soon' : 'fn';
            const tag = it.soon ? '<span class="mini-soon">скоро</span>' : '';
            const el = it.soon ? 'div' : 'a';
            const href = it.soon ? '' : 'href="#"';
            return `<${el} class="${cls}" ${href}>
              <span class="ib">${svg(it.icon, 17)}</span>
              <span class="lbl">${it.t}<small>${it.d}</small></span>${tag}
            </${el}>`;
          }).join('')}
        </div>
      </div>`;
    }
    blocksEl.innerHTML = html || `<div class="empty">Ничего не найдено по запросу «${filter}».</div>`;
  }
  render();
  document.getElementById('q').addEventListener('input', e => render(e.target.value));
</script>
</body>
</html>
